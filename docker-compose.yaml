services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DEBUG=true
    volumes:
      - data_volume:/app/data
      - static_volume:/app/staticfiles

  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/home/app/web/static
    depends_on:
      - web

volumes:
  static_volume:
  data_volume:
